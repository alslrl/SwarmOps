<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720,height=405">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:720pt;height:405pt;font-family:'Pretendard',sans-serif;background:#0a0a0a;color:#f5f5f5;display:flex;flex-direction:column;justify-content:center;overflow:hidden;padding:48px 64px}
.label{display:inline-block;margin-bottom:16px}
.label p{font-size:11px;font-weight:600;color:#3b82f6;letter-spacing:1.5px;text-transform:uppercase}
h1{font-size:32px;font-weight:700;line-height:1.3;letter-spacing:-0.5px;margin-bottom:28px}
h1 span{color:#3b82f6}
.points{display:flex;flex-direction:column;gap:14px;margin-bottom:28px}
.point{display:flex;align-items:flex-start;gap:12px}
.point .icon{font-size:16px;flex-shrink:0;margin-top:2px}
.point p{font-size:14px;color:#d4d4d4;line-height:1.55}
p.strong{font-size:14px;color:#d4d4d4;line-height:1.55}
p.strong strong{color:#f5f5f5}
.question{border-top:1px solid #262626;padding-top:20px}
.question p{font-size:20px;font-weight:600;color:#f5f5f5;line-height:1.4}
.question p span{color:#3b82f6}
</style>
</head>
<body>
<div class="label"><p>PROBLEM</p></div>
<h1>셀러는 매번 <span>감</span>으로 결정한다</h1>
<div class="points">
  <div class="point">
    <p class="icon">🔄</p>
    <p>상품 제목, 카피, 가격을 수시로 바꿔야 하지만 — 어떤 조합이 경쟁사를 이기는지 <strong style="color:#f5f5f5">적용 전까지 알 수 없다</strong></p>
  </div>
  <div class="point">
    <p class="icon">⏳</p>
    <p>A/B 테스트는 실제 트래픽을 태우고 며칠~몇 주를 기다려야 한다</p>
  </div>
  <div class="point">
    <p class="icon">📉</p>
    <p>감으로 바꾸면 매출이 떨어질 수도 있다 — 탈모샴푸 레드오션에서 작은 차이가 순위를 결정</p>
  </div>
</div>
<div class="question">
  <p><span>적용하기 전에</span> 미리 확인할 수 있다면?</p>
</div>
</body>
</html>
