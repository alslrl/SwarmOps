<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720,height=405">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:720pt;height:405pt;font-family:'Pretendard',sans-serif;background:#0a0a0a;color:#f5f5f5;display:flex;flex-direction:column;justify-content:center;align-items:center;overflow:hidden;position:relative}
.accent-line{position:absolute;top:0;left:0;width:100%;height:3px;background:#3b82f6}
.content{display:flex;flex-direction:column;align-items:center;gap:20px;text-align:center;padding:0 80px}
h1{font-size:46px;font-weight:800;letter-spacing:-1.5px;line-height:1.2}
h1 span{color:#3b82f6}
p.subtitle{font-size:18px;color:#a3a3a3;font-weight:400;line-height:1.5;max-width:520px}
.meta{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:16px}
p.team{font-size:13px;color:#737373;font-weight:500;letter-spacing:0.5px}
p.github{font-size:12px;color:#525252;font-weight:400}
</style>
</head>
<body>
<div class="accent-line"></div>
<div class="content">
  <h1><span>Swarm</span>Ops</h1>
  <p class="subtitle">800개 AI 구매자가 당신의 상품 전략을 검증합니다</p>
  <div class="meta">
    <p class="team">Team SwarmOps · 손세호</p>
    <p class="github">github.com/alslrl/SwarmOps</p>
  </div>
</div>
</body>
</html>
